<!DOCTYPE html>
<html>
<head>
<title>Wedding Invitation</title>
<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:black;
color:white;
}

#curtain{
position:fixed;
width:100%;
height:100%;
background:#8b0000;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

#content{
display:none;
padding-top:100px;
}
</style>
</head>

<body>

<div id="curtain" onclick="openCurtain()">
Click to Open Invitation
</div>

<div id="content">
<h1>Welcome to Our Wedding</h1>
<p>You are invited to celebrate our special day</p>
</div>

<script>
function openCurtain(){
document.getElementById("curtain").style.display="none";
document.getElementById("content").style.display="block";
}
</script>

</body>
  </html>
